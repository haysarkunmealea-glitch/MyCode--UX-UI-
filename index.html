<!DOCTYPE html>
<html>
<head>
<title>MyCode</title>
</head>

<body>
 <div class="card">
    <h1 style="text-align:center;">Student Webpage</h1>
    <p style="text-align:center;">HTML + CSS Practice (Form + Table Advanced) </p>
</div>

<style>

        body {
            background-color: #f2f2f5;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        header {
            background-color: #4d8fe3;
            color: white;
            text-align: center;
            padding: 40px;
            border-radius: 0 0 20px 20px;
            margin-bottom: 20px;
        }

        .section {
            background-color: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

    </style>
</head>

<h2>Image Section</h2>
<img src="https://img.magnific.com/free-vector/book-floating-cartoon-vector-icon-illustration-education-object-icon-isolated-flat-vector_138676-13661.jpg?semt=ais_hybrid&w=740&q=80" alt="book-floating-cartoon-vector-icon-illustration-education-object-icon-isolated-flat-vector_138676-13661">

<style>
    img {
            width: 300px;
            border-radius: 10px;
        }
</style>

  <h2>Advanced Table</h2>

  <style>
    table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: #4d8fe3;
            color: white;
        }
  </style>

    <table>
      <tr>
        <th rowspan="2">Name</th>
        <th colspan="2">Scores</th>
        <th rowspan="2">Grade</th>
      </tr>

      <tr>
        <th>Math</th>
        <th>CS</th>
      </tr>

      <tr>
        <td>Alice</td>
        <td>90</td>
        <td>95</td>
        <td>A</td>
      </tr>

      <tr>
        <td>Bob</td>
        <td>80</td>
        <td>85</td>
        <td>B</td>
      </tr>
    </table>
  </div>
  
  <style>
table, th, td {
  border: 1px solid white;
  border-collapse: collapse;
}
th, td {
  background-color: #96D4D4;
}
</style>


  <div class="card">

    <div class="form-container">
      <h2>Form 1: Basic Info</h2>

      <form>

        <label>
          Name <span class="required">*</span>
        </label>
        <input type="text" required>

        <label>
          Email <span class="required">*</span>
        </label>
        <input type="email" required>

        <label>
          Password <span class="required">*</span>
        </label>
        <input type="password" required>

        <label>Upload File</label>
        <input type="file">

        <div class="buttons">
          <button type="submit">Submit</button>
          <button type="reset">Reset</button>
        </div>

      </form>
    </div>
  </div>


  <div class="card">

    <div class="form-container">
      <h2>Form 2: Survey Form</h2>

      <form>

        <label>
          Choose Course <span class="required">*</span>
        </label>

<select required>
          <option>-- Select --</option>
          <option>HTML</option>
          <option>CSS</option>
          <option>JavaScript</option>
        </select>

        <label>Gender</label>

        <input class="inline" type="radio" name="gender"> Male
        <input class="inline" type="radio" name="gender"> Female

        <label>Skills</label>

        <div class="skills">
          <input class="inline" type="checkbox"> HTML
          <input class="inline" type="checkbox"> CSS
          <input class="inline" type="checkbox"> JS
        </div>

        <label>
          Phone <span class="required">*</span>
        </label>
        <input type="tel" required>

        <label>Message</label>
        <textarea rows="5"></textarea>

        <div class="buttons">
          <button type="submit">Send</button>
        </div>

      </form>
    </div>
  </div>

  <style>
     .form-box {
            width: 40%;
            margin: auto;
        }

        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        textarea {
            resize: vertical;
        }

        .inline {
            width: auto;
        }

    button {
            background-color: #4d8fe3;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 5px;
            margin-top: 15px;
            cursor: pointer;
        }

        button:hover {
            background-color: #3575c8;
        }

        .required {
            color: red;
        }
  </style>

</body>
</html>
